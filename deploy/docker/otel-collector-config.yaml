receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # 导出到控制台（开发环境）
  logging:
    loglevel: debug

  # 导出到 Prometheus（可选）
  prometheus:
    endpoint: "0.0.0.0:8888"
    const_labels:
      environment: dev

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
