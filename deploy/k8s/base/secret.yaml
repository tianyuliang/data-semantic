apiVersion: v1
kind: Secret
metadata:
  name: data-semantic-secret
  labels:
    app: data-semantic
type: Opaque
stringData:
  # 数据库密码
  DB_PASSWORD: "root123456"

  # Redis 密码
  REDIS_PASSWORD: ""

  # 认证密钥 (生产环境请使用 32 位随机字符串)
  AUTH_ACCESS_SECRET: "your-secret-key-change-in-production-please-use-32-chars"

  # Auth过期时间
  AUTH_ACCESS_EXPIRE: "7200"

  # Hydra Admin URL
  AUTH_HYDRA_ADMIN_URL: "http://hydra:4445"

  # Hydra 超时时间
  AUTH_HYDRA_TIMEOUT_SEC: "10"

  # AI 服务配置
  AI_SERVICE_URL: ""
  AI_SERVICE_TIMEOUT_SECONDS: "10"

  # UserManagement 服务配置
  USER_MANAGEMENT_URL: ""
  USER_MANAGEMENT_TIMEOUT_SECONDS: "10"
