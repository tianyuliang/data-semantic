apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-semantic.fullname" . }}-api
  namespace: {{ include "data-semantic.namespace" . }}
  labels:
    {{- include "data-semantic.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.api.type }}
  ports:
  - port: {{ .Values.service.api.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "data-semantic.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
